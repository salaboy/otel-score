apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-eval-backend
  namespace: demo
  labels:
    app: otel-eval-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-eval-backend
  template:
    metadata:
      labels:
        app: otel-eval-backend
    spec:
      containers:
      - name: otel-eval-backend
        image: otel-eval-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: OTEL_SERVICE_NAME
          value: "otel-eval-backend"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector-opentelemetry-collector.opentelemetry.svc.cluster.local:4318"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: otel-eval-backend
  namespace: demo
  labels:
    app: otel-eval-backend
spec:
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: otel-eval-backend
  type: ClusterIP
