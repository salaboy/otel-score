name: Evaluate CNCF Project OTel Maturity

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'CNCF project name (e.g. jaeger)'
        required: true
        type: string
      project_url:
        description: 'CNCF project GitHub URL (e.g. https://github.com/jaegertracing/jaeger)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Evaluation setup ─────────────────────────────────────────────────

      - name: Install kind
        run: |
          sudo curl -fsSL https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64 -o /usr/local/bin/kind
          sudo chmod +x /usr/local/bin/kind
          kind version

      - name: Install helm
        run: |
          curl -fsSL https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz -o /tmp/helm.tar.gz
          sudo tar -xzf /tmp/helm.tar.gz --strip-components=1 -C /usr/local/bin linux-amd64/helm
          helm version

      - name: Set up OTel evaluation cluster
        run: bash scripts/setup-otel-cluster.sh "${{ github.event.inputs.project_name }}"

      # ── Start otel-score ─────────────────────────────────────────────────
      # The container ships with kind, kubectl, helm, jq, and the Docker CLI.
      # --network=host is required so that kubectl inside the container can reach
      # the kind cluster API server at 127.0.0.1:<port> on the host; without it
      # 127.0.0.1 resolves to the container's own loopback and all kubectl calls fail.
      # The Docker socket is mounted so kind can create clusters on the host daemon.
      # /tmp is shared so the OTel Collector can write JSONL files the container
      # can later read back for evaluation.

      - name: Start otel-score
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS_API_KEY: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS_API_KEY }}
          DASH0_DATASET: ${{ secrets.DASH0_DATASET }}
        run: |
          docker run -d --name otel-score \
            --network=host \
            -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            -e OTEL_EXPORTER_OTLP_ENDPOINT="${OTEL_EXPORTER_OTLP_ENDPOINT}" \
            -e OTEL_EXPORTER_OTLP_HEADERS_API_KEY="${OTEL_EXPORTER_OTLP_HEADERS_API_KEY}" \
            -e DASH0_DATASET="${DASH0_DATASET}" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp:/tmp \
            ghcr.io/${{ github.repository }}:latest

      - name: Wait for otel-score to be ready
        run: |
          echo "Waiting for otel-score on port 8080..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:8080/; then
              echo "Ready (attempt ${i})"
              exit 0
            fi
            echo "  ${i}/30 — sleeping 3s"
            sleep 3
          done
          echo "otel-score did not start within 90s"
          docker logs otel-score
          exit 1

      # ── Trigger evaluation ───────────────────────────────────────────────

      - name: Run evaluation
        id: evaluation
        continue-on-error: true
        run: |
          echo "Evaluating: ${{ github.event.inputs.project_url }}"
          set +o pipefail
          curl -sS -N -X POST http://localhost:8080/api/chat \
            -H "Content-Type: application/json" \
            -H "Accept: text/event-stream" \
            -d "{\"conversationId\": \"eval-${{ github.event.inputs.project_name }}\", \"clusterName\": \"otel-eval-${{ github.event.inputs.project_name }}\", \"projectName\": \"${{ github.event.inputs.project_name }}\", \"projectUrl\": \"${{ github.event.inputs.project_url }}\", \"message\": \"The kind cluster otel-eval-${{ github.event.inputs.project_name }} is already running with the OTel Collector and test backend deployed. Go straight to install the project, evaluate its OTel maturity, and generate the report.\"}" \
            --max-time 7200 2>evaluation-curl-errors.txt | tee evaluation-response.txt
          CURL_EXIT=${PIPESTATUS[0]}
          set -o pipefail
          if [[ $CURL_EXIT -ne 0 ]]; then
            echo "## Evaluation request failed" > evaluation-errors.txt
            echo "" >> evaluation-errors.txt
            echo "curl exited with code \`$CURL_EXIT\`" >> evaluation-errors.txt
            echo "" >> evaluation-errors.txt
            if [[ -s evaluation-curl-errors.txt ]]; then
              echo '```' >> evaluation-errors.txt
              cat evaluation-curl-errors.txt >> evaluation-errors.txt
              echo '```' >> evaluation-errors.txt
            fi
            echo "" >> evaluation-errors.txt
            exit $CURL_EXIT
          fi

      # ── Extract results from container ────────────────────────────────────
      # The agent writes to /app/.otel-eval/ inside the container (ShellTools
      # runs inside the container, not on the host). Only /tmp is shared via
      # volume mount, so we need to docker cp the evaluation artifacts out.

      - name: Copy evaluation artifacts from container
        if: always()
        run: |
          echo "── Locating evaluation files inside container:"
          docker exec otel-score find /app/.otel-eval -type f 2>/dev/null || echo "  (no files at /app/.otel-eval)"

          # docker cp copies a dir INTO an existing target, creating a nested
          # subdirectory. Remove the host copy first so docker cp creates it fresh.
          rm -rf ".otel-eval/${{ github.event.inputs.project_name }}"
          docker cp "otel-score:/app/.otel-eval/${{ github.event.inputs.project_name }}" \
                    ".otel-eval/${{ github.event.inputs.project_name }}" || \
            echo "WARNING: docker cp failed — files may be at a different path"

          echo "── Files on host after extraction:"
          find ".otel-eval/${{ github.event.inputs.project_name }}" -type f 2>/dev/null || echo "  (none)"

      # ── Artifacts ────────────────────────────────────────────────────────

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: otel-evaluation-${{ github.event.inputs.project_name }}
          path: |
            evaluation-response.txt
            .otel-eval/${{ github.event.inputs.project_name }}/
            /tmp/otel-eval-${{ github.event.inputs.project_name }}/
          if-no-files-found: warn

      # ── Open PR with results ─────────────────────────────────────────────

      - name: Collect results for PR
        if: always()
        id: collect
        run: |
          SRC=".otel-eval/${{ github.event.inputs.project_name }}"
          DST="results/${{ github.event.inputs.project_name }}"

          if [[ ! -d "$SRC" ]] || [[ -z "$(ls -A "$SRC" 2>/dev/null)" ]]; then
            echo "WARNING: no evaluation files were generated at $SRC"
            echo "── Container logs (last 50 lines):"
            docker logs otel-score --tail=50 2>/dev/null || true
            exit 0
          fi

          mkdir -p "$DST"
          cp -r "$SRC"/. "$DST"/

          echo "── Files included in the pull request:"
          find "$DST" -type f -exec ls -lh {} \;
          echo "files_found=1" >> "$GITHUB_OUTPUT"

          # Check each expected artifact and track missing ones
          MISSING=""
          for file in RESEARCH.md INSTALL-PLAN.md EVALUATION.md report.html; do
            if [[ -f "$DST/$file" ]]; then
              echo "  ✓ $file"
            else
              echo "  ✗ $file — MISSING"
              MISSING="$MISSING\n- \`$file\`"
            fi
          done

          if [[ -f "$DST/report.html" ]]; then
            echo "report_generated=1" >> "$GITHUB_OUTPUT"
          else
            # Append missing artifacts to the error report
            touch evaluation-errors.txt
            {
              echo "## Missing evaluation artifacts"
              echo ""
              echo "The following expected files were not generated:"
              echo -e "$MISSING"
              echo ""
            } >> evaluation-errors.txt
          fi

          # Append container logs if there were any errors
          if [[ -s evaluation-errors.txt ]]; then
            {
              echo "## Container logs (last 100 lines)"
              echo ""
              echo '```'
              docker logs otel-score --tail=100 2>&1 || echo "(could not retrieve logs)"
              echo '```'
            } >> evaluation-errors.txt
          fi

      - name: Create pull request with results
        id: create-pr
        if: always() && steps.collect.outputs.files_found == '1'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: results/${{ github.event.inputs.project_name }}
          base: main
          commit-message: "results: add OTel maturity evaluation for ${{ github.event.inputs.project_name }}"
          title: "OTel maturity report: ${{ github.event.inputs.project_name }}${{ steps.collect.outputs.report_generated == '1' && '' || ' (incomplete)' }}"
          body: |
            Automated OTel maturity evaluation for [${{ github.event.inputs.project_name }}](${{ github.event.inputs.project_url }}).

            **Status:** ${{ steps.collect.outputs.report_generated == '1' && 'Completed' || 'Incomplete — the report was not generated. The files included can be reused for another evaluation run.' }}

            All files from the `.otel-eval/${{ github.event.inputs.project_name }}/` evaluation directory are included.

            Triggered by @${{ github.actor }} via workflow dispatch.
          add-paths: results/${{ github.event.inputs.project_name }}/*

      - name: Comment on PR with errors
        if: always() && steps.create-pr.outputs.pull-request-number && hashFiles('evaluation-errors.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          echo "Adding error details to PR #${PR_NUMBER}"
          gh pr comment "$PR_NUMBER" --body "$(cat evaluation-errors.txt)"

      - name: Retry PR on transient failure
        if: failure() && steps.collect.outputs.files_found == '1'
        run: |
          echo "PR creation failed — retrying with git + gh cli"
          cd "$GITHUB_WORKSPACE"
          git checkout -B "results/${{ github.event.inputs.project_name }}"

          # Re-collect (the failed action may have left the worktree dirty)
          SRC=".otel-eval/${{ github.event.inputs.project_name }}"
          DST="results/${{ github.event.inputs.project_name }}"
          rm -rf "$DST"
          mkdir -p "$DST"
          cp -r "$SRC"/. "$DST"/

          git add "results/${{ github.event.inputs.project_name }}/"
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "results: add OTel maturity evaluation for ${{ github.event.inputs.project_name }}" || true

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3..."
            if git push -f origin "results/${{ github.event.inputs.project_name }}" 2>&1; then
              break
            fi
            echo "Push failed — waiting 10s before retry"
            sleep 10
          done

          EXISTING=$(gh pr list --head "results/${{ github.event.inputs.project_name }}" --json number --jq '.[0].number' 2>/dev/null || true)
          if [[ -z "$EXISTING" ]]; then
            gh pr create \
              --title "OTel maturity report: ${{ github.event.inputs.project_name }}" \
              --body "$(cat <<'BODY'
          Automated OTel maturity evaluation for [${{ github.event.inputs.project_name }}](${{ github.event.inputs.project_url }}).

          ## Included files
          - `report.html` — interactive radar chart report
          - `EVALUATION.md` — detailed per-dimension assessment with evidence
          - `RESEARCH.md` — research notes from project installation
          - `INSTALL-PLAN.md` — installation plan and configuration

          > Only files that were successfully generated are included.

          Triggered by @${{ github.actor }} via workflow dispatch.
          BODY
          )" \
              --base main \
              --head "results/${{ github.event.inputs.project_name }}"
          else
            echo "PR #${EXISTING} already exists"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print otel-score logs on failure
        if: failure()
        run: docker logs otel-score
