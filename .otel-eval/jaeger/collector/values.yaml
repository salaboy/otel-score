mode: deployment
replicaCount: 1
image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.150.1"

resources:
  limits:
    memory: 512Mi
  requests:
    memory: 256Mi

presets:
  clusterMetrics:
    enabled: true
  logsCollection:
    enabled: true
  kubeletMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: true

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "services", "endpoints", "nodes", "nodes/proxy"]
      verbs: ["get", "list", "watch"]

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

extraVolumes:
  - name: otel-output
    hostPath:
      path: /tmp/otel
      type: DirectoryOrCreate

extraVolumeMounts:
  - name: otel-output
    mountPath: /tmp/otel

config:
  processors:
    memory_limiter:
      check_interval: 2s
      limit_percentage: 75
      spike_limit_percentage: 15

    batch:
      timeout: 5s
      send_batch_size: 512

    k8sattributes:
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.replicaset.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.cronjob.name
          - k8s.job.name
          - k8s.node.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.pod.start_time
          - k8s.container.name
        labels:
          - from: pod
            key_regex: (.*)
            tag_name: k8s.pod.label.$${1}
        annotations:
          - from: pod
            key_regex: (.*)
            tag_name: k8s.pod.annotation.$${1}
      passthrough: false
      pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection

  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}
    # prometheus receiver is intentionally omitted here — it requires at least
    # one scrape_config or a target_allocator to be valid. The install-cncf-project
    # skill adds project-specific scrape targets and re-applies this config via
    # helm upgrade when the evaluated project exposes Prometheus metrics.

  exporters:
    file/traces:
      path: /tmp/otel/traces.jsonl
      format: json
    file/metrics:
      path: /tmp/otel/metrics.jsonl
      format: json
    file/logs:
      path: /tmp/otel/logs.jsonl
      format: json
    debug:
      verbosity: detailed

  service:
    extensions:
      - health_check
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - k8sattributes
          - batch
        exporters:
          - file/traces
          - debug
      metrics:
        receivers:
          - otlp
          - k8s_cluster
        processors:
          - memory_limiter
          - k8sattributes
          - batch
        exporters:
          - file/metrics
          - debug
      logs:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - k8sattributes
          - batch
        exporters:
          - file/logs
          - debug
