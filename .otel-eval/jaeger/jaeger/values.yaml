# Jaeger v2 Helm values for OTel maturity evaluation
# Chart: jaegertracing/jaeger v4.7.0 (app v2.17.0)

jaeger:
  enabled: true
  replicas: 1
  image:
    repository: jaegertracing/jaeger
    pullPolicy: IfNotPresent

# Override Jaeger's internal OTel Collector config to:
# 1. Keep all default receivers (OTLP, Jaeger, Zipkin)
# 2. Export self-metrics via OTLP to our evaluation collector
# 3. Also expose Prometheus metrics on :8888 (for scraping)
# 4. Enable structured logs
userconfig:
  service:
    extensions: [jaeger_storage, jaeger_query, healthcheckv2]
    pipelines:
      traces:
        receivers: [otlp, jaeger, zipkin]
        processors: [batch]
        exporters: [jaeger_storage_exporter]
    telemetry:
      resource:
        service.name: jaeger
      metrics:
        level: detailed
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
          - periodic:
              interval: 15000
              exporter:
                otlp:
                  protocol: grpc
                  endpoint: http://otel-collector-opentelemetry-collector.opentelemetry.svc.cluster.local:4317
      logs:
        level: info

  extensions:
    healthcheckv2:
      use_v2: true
      http:
        endpoint: 0.0.0.0:13133

    jaeger_query:
      storage:
        traces: primary_store

    jaeger_storage:
      backends:
        primary_store:
          memory:
            max_traces: 100000

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    jaeger:
      protocols:
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_http:
          endpoint: 0.0.0.0:14268
        thrift_compact:
          endpoint: 0.0.0.0:6831
        thrift_binary:
          endpoint: 0.0.0.0:6832
    zipkin:
      endpoint: 0.0.0.0:9411

  processors:
    batch:

  exporters:
    jaeger_storage_exporter:
      trace_storage: primary_store
