clusterRole:
  create: true
config:
  exporters:
    debug:
      verbosity: detailed
    file/logs:
      format: json
      path: /tmp/otel/logs.jsonl
    file/metrics:
      format: json
      path: /tmp/otel/metrics.jsonl
    file/traces:
      format: json
      path: /tmp/otel/traces.jsonl
  processors:
    batch:
      send_batch_size: 512
      timeout: 5s
    k8sattributes:
      extract:
        annotations:
        - from: pod
          key_regex: (.*)
          tag_name: k8s.pod.annotation.$${1}
        labels:
        - from: pod
          key_regex: (.*)
          tag_name: k8s.pod.label.$${1}
        metadata:
        - k8s.namespace.name
        - k8s.deployment.name
        - k8s.replicaset.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.cronjob.name
        - k8s.job.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.pod.start_time
        - k8s.container.name
      passthrough: false
      pod_association:
      - sources:
        - from: resource_attribute
          name: k8s.pod.ip
      - sources:
        - from: resource_attribute
          name: k8s.pod.uid
      - sources:
        - from: connection
    memory_limiter:
      check_interval: 2s
      limit_percentage: 75
      spike_limit_percentage: 15
  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}
    prometheus:
      config:
        scrape_configs:
        - job_name: tekton-pipelines-controller
          scrape_interval: 15s
          static_configs:
          - targets:
            - tekton-pipelines-controller.tekton-pipelines.svc.cluster.local:9090
        - job_name: tekton-pipelines-webhook
          scrape_interval: 15s
          static_configs:
          - targets:
            - tekton-pipelines-webhook.tekton-pipelines.svc.cluster.local:9090
        - job_name: tekton-events-controller
          scrape_interval: 15s
          static_configs:
          - targets:
            - tekton-events-controller.tekton-pipelines.svc.cluster.local:9090
  service:
    extensions:
    - health_check
    pipelines:
      logs:
        exporters:
        - file/logs
        - debug
        processors:
        - memory_limiter
        - k8sattributes
        - batch
        receivers:
        - otlp
      metrics:
        exporters:
        - file/metrics
        - debug
        processors:
        - memory_limiter
        - k8sattributes
        - batch
        receivers:
        - otlp
        - k8s_cluster
        - prometheus
      traces:
        exporters:
        - file/traces
        - debug
        processors:
        - memory_limiter
        - k8sattributes
        - batch
        receivers:
        - otlp
extraVolumeMounts:
- mountPath: /tmp/otel
  name: otel-output
extraVolumes:
- hostPath:
    path: /tmp/otel
    type: DirectoryOrCreate
  name: otel-output
image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.150.1
mode: deployment
presets:
  clusterMetrics:
    enabled: true
  kubeletMetrics:
    enabled: false
  kubernetesAttributes:
    enabled: true
    extractAllPodAnnotations: true
    extractAllPodLabels: true
  logsCollection:
    enabled: false
replicaCount: 1
resources:
  limits:
    memory: 512Mi
  requests:
    memory: 256Mi
tolerations:
- effect: NoSchedule
  key: node-role.kubernetes.io/control-plane
  operator: Exists
