spring:
  application:
    name: otel-score
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096
          temperature: 0.7
    chat:
      observations:
        include-error-logging: true
        log-completion: true
        log-prompt: true


logging:
  level:
    org.springframework.ai: DEBUG


management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/metrics
        headers:
          Authorization: "Bearer ${OTEL_EXPORTER_OTLP_HEADERS_API_KEY}"
          Dash0-Dataset: "otel-score"
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/traces
          headers:
            Authorization: "Bearer ${OTEL_EXPORTER_OTLP_HEADERS_API_KEY}"
            Dash0-Dataset: "otel-score"
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/logs
          headers:
            Authorization: "Bearer ${OTEL_EXPORTER_OTLP_HEADERS_API_KEY}"
            Dash0-Dataset: "otel-score"

server:
  port: 8080
