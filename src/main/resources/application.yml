spring:
  application:
    name: otel-score
  # Disable the Tomcat async/SSE timeout. Spring MVC adapts Flux<String> as an
  # async response and the default timeout would close the stream mid-evaluation.
  mvc:
    async:
      request-timeout: -1
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      # Sets the OkHttp call timeout on the Anthropic Java SDK client.
      # Evaluations involve long tool calls (helm install, traffic generation, etc.)
      # and the default SDK timeout (~10 min) will kill the stream mid-evaluation.
      timeout: 2h
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 16384
          temperature: 0.7
    chat:
      observations:
        include-error-logging: true
        log-completion: true
        log-prompt: true
    tools:
      observations:
        include-content: true


logging:
  level:
    org.springframework.ai: INFO
    otel-score.tools: INFO


management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/metrics
        headers:
          Authorization: "Bearer ${OTEL_EXPORTER_OTLP_HEADERS_API_KEY}"
          Dash0-Dataset: "${DASH0_DATASET}"
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/traces
          headers:
            Authorization: "Bearer ${OTEL_EXPORTER_OTLP_HEADERS_API_KEY}"
            Dash0-Dataset: "${DASH0_DATASET}"
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/logs
          headers:
            Authorization: "Bearer ${OTEL_EXPORTER_OTLP_HEADERS_API_KEY}"
            Dash0-Dataset: "${DASH0_DATASET}"

server:
  port: 8080
